name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          xcodebuild -scheme Utter \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            build
